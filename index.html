                    ${t.projects.items.map(([Icon, title, sub, text, chips]) => html`<${motion.article} key=${title} whileHover=${{ y: -10 }} className="strong relative overflow-hidden rounded-[32px] p-7 shadow-glow transition hover:border-cyan-300/35"><div className="absolute inset-0 bg-panel opacity-80"></div><div className="relative"><div className="flex items-center justify-between gap-4"><div className="flex h-14 w-14 items-center justify-center rounded-2xl border border-cyan-400/20 bg-cyan-400/10"><${Icon} className="h-6 w-6 text-cyan-200" /></div><span className="eyebrow text-right">${sub}</span></div><h3 className="mt-6 font-display text-2xl font-bold text-white sm:text-3xl">${title}</h3><p className="mt-4 text-sm leading-7 text-slate-300 sm:text-base">${text}</p><div className="mt-6 flex flex-wrap gap-2">${chips.map((item) => html`<span key=${item} className="rounded-full border border-white/10 bg-white/[0.04] px-3 py-1.5 font-mono text-xs uppercase tracking-[0.16em] text-slate-300">${item}</span>`)}</div></div></${motion.article}>`)}
                  </div>
                </div>
              </${motion.section}>

              <${motion.section} id="trayectoria" className="shell py-16 sm:py-20" initial=${{ opacity: 0, y: 28 }} whileInView=${{ opacity: 1, y: 0 }} viewport=${{ once: true, amount: 0.2 }} transition=${{ duration: 0.7 }}>
                <div className="grid gap-10 lg:grid-cols-[1.05fr_0.95fr] lg:gap-12">
                  <div className="space-y-8">
                    <${SectionTitle} tag=${t.experience.tag} title=${t.experience.title} text=${t.experience.text} />
                    <div className="space-y-6">
                      ${t.experience.items.map(([org, role, text], index) => html`<div key=${org} className="relative pl-10"><div className="absolute left-0 top-1.5 flex h-6 w-6 items-center justify-center rounded-full border border-cyan-400/30 bg-slate-950"><div className="h-2.5 w-2.5 rounded-full bg-cyan-300"></div></div>${index === 0 ? html`<div className="absolute left-[11px] top-8 h-[calc(100%+1.5rem)] w-px bg-white/10"></div>` : null}<${Card}><p className="eyebrow">${t.experience.current}</p><h3 className="mt-3 font-display text-2xl font-bold text-white">${org}</h3><p className="mt-2 text-base font-medium text-cyan-200">${role}</p><p className="mt-5 text-sm leading-7 text-slate-300">${text}</p></${Card}></div>`)}
                    </div>
                  </div>
                  <div className="space-y-8">
                    <${SectionTitle} tag=${t.education.tag} title=${t.education.title} text=${t.education.text} />
                    <div className="grid gap-5">
                      ${t.education.items.map(([Icon, title, sub]) => html`<${Card} key=${title}><div className="flex h-12 w-12 items-center justify-center rounded-2xl border border-white/10 bg-white/[0.04]"><${Icon} className="h-5 w-5 text-cyan-200" /></div><h3 className="mt-5 font-display text-xl font-bold text-white">${title}</h3><p className="mt-2 font-mono text-xs uppercase tracking-[0.18em] text-cyan-300/75">${sub}</p></${Card}>`)}
                    </div>
                  </div>
                </div>
              </${motion.section}>

              <${motion.section} id="skills" className="shell py-16 sm:py-20" initial=${{ opacity: 0, y: 28 }} whileInView=${{ opacity: 1, y: 0 }} viewport=${{ once: true, amount: 0.2 }} transition=${{ duration: 0.7 }}>
                <div className="flex flex-col gap-10">
                  <${SectionTitle} tag=${t.skills.tag} title=${t.skills.title} text=${t.skills.text} />
                  <div className="grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
                    ${t.skills.items.map(([Icon, label]) => html`<${motion.div} key=${label} whileHover=${{ scale: 1.03, y: -6 }}><${Card}><div className="flex items-center gap-4"><div className="flex h-11 w-11 items-center justify-center rounded-2xl border border-white/10 bg-white/[0.04]"><${Icon} className="h-5 w-5 text-cyan-200" /></div><h3 className="font-display text-lg font-bold text-white">${label}</h3></div></${Card}></${motion.div}>`)}
                  </div>
                </div>
              </${motion.section}>

              <${motion.section} id="contacto" className="shell py-16 pb-12 sm:py-20" initial=${{ opacity: 0, y: 28 }} whileInView=${{ opacity: 1, y: 0 }} viewport=${{ once: true, amount: 0.2 }} transition=${{ duration: 0.7 }}>
                <div className="strong relative overflow-hidden rounded-[36px] p-7 shadow-glow sm:p-10">
                  <div className="absolute inset-0 bg-panel opacity-90"></div>
                  <div className="relative grid gap-8 lg:grid-cols-[1.1fr_0.9fr] lg:items-end">
                    <div>
                      <p className="eyebrow">${t.contact.tag}</p>
                      <h2 className="mt-4 font-display text-3xl font-bold tracking-tight text-white sm:text-4xl">${t.contact.title}</h2>
                      <p className="mt-5 max-w-2xl text-base leading-8 text-slate-300">${t.contact.text}</p>
                      <div className="mt-8 flex flex-wrap gap-3">
                        ${socialLinks.map(([Icon, label, href]) => html`<a key=${label} href=${href} target="_blank" rel="noreferrer" className="group inline-flex items-center justify-center gap-3 rounded-full border border-white/10 bg-white/[0.04] px-5 py-3 text-sm font-medium text-slate-200 transition hover:border-cyan-300/30 hover:bg-white/[0.07] hover:text-white"><${Icon} className="h-4 w-4 text-cyan-300" /><span>${label}</span><${ArrowUpRight} className="h-4 w-4 text-slate-500 transition group-hover:text-cyan-200" /></a>`)}
                      </div>
                    </div>
                    <div className="grid gap-4 sm:grid-cols-2">
                      ${t.contact.cards.map(([eyebrow, title, text]) => html`<${Card} key=${title} className="h-full"><p className="font-mono text-xs uppercase tracking-[0.22em] text-slate-500">${eyebrow}</p><p className="mt-3 font-display text-2xl font-bold text-white">${title}</p><p className="mt-3 text-sm leading-7 text-slate-300">${text}</p></${Card}>`)}
                    </div>
                  </div>
                </div>
              </${motion.section}>
            </main>

            <footer className="shell pb-10">
              <div className="flex flex-col gap-4 border-t border-white/8 pt-6 text-sm text-slate-500 sm:flex-row sm:items-center sm:justify-between">
                <p>${t.footer[0]}</p>
                <p className="font-mono text-xs uppercase tracking-[0.18em] text-slate-600">${t.footer[1]}</p>
              </div>
            </footer>
          </div>
        `;
      };

      createRoot(document.getElementById('root')).render(html`<${App} />`);
    </script>
  </body>
</html>
