<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content='Portfolio de Carlos "Charly" Salini, Senior Technology Leader especializado en automatizacion, IA aplicada y arquitectura de software.'
    />
    <meta name="theme-color" content="#020617" />
    <title>Carlos "Charly" Salini | AI & Automation Leader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { ink: '#020617', accent: '#38bdf8', electric: '#22d3ee', cobalt: '#2563eb' },
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
              display: ['"Space Grotesk"', 'sans-serif'],
              mono: ['"IBM Plex Mono"', 'monospace'],
            },
            backgroundImage: {
              accent: 'linear-gradient(135deg,#22d3ee 0%,#38bdf8 45%,#2563eb 100%)',
              panel: 'linear-gradient(135deg,rgba(34,211,238,.14),rgba(37,99,235,.08) 60%,rgba(2,6,23,.06) 100%)',
            },
            boxShadow: {
              glow: '0 0 0 1px rgba(56,189,248,.16),0 28px 80px rgba(37,99,235,.22)',
              panel: '0 22px 48px rgba(2,6,23,.45)',
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply bg-ink font-sans text-slate-100 antialiased;
          background-image:
            radial-gradient(circle at top, rgba(56,189,248,.12), transparent 28%),
            radial-gradient(circle at 82% 18%, rgba(37,99,235,.18), transparent 24%),
            linear-gradient(180deg,#020617 0%,#030712 40%,#020617 100%);
        }
        ::selection { background: rgba(34,211,238,.28); color: #f8fafc; }
      }
      @layer utilities {
        .shell { @apply mx-auto max-w-7xl px-4 sm:px-6 lg:px-8; }
        .eyebrow { @apply font-mono text-xs uppercase tracking-[0.26em] text-cyan-300/80; }
        .surface { @apply border border-white/10 bg-white/[0.04] backdrop-blur-xl; }
        .strong { @apply border border-cyan-400/20 bg-slate-950/70 backdrop-blur-2xl; }
        .text-gradient { @apply bg-accent bg-clip-text text-transparent; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import React from 'https://esm.sh/react@18';
      import { createRoot } from 'https://esm.sh/react-dom@18/client';
      import htm from 'https://esm.sh/htm';
      import { motion } from 'https://esm.sh/framer-motion@11.18.2?deps=react@18';
      import {
        ArrowRight, ArrowUpRight, Blocks, Bot, BrainCircuit, Building2, Code2,
        Database, Github, Globe, GraduationCap, Linkedin, MessageSquareMore,
        Rocket, ServerCog, ShieldCheck, Sparkles, Target, UsersRound, Workflow
      } from 'https://esm.sh/lucide-react?deps=react@18';

      const html = htm.bind(React.createElement);
      const nav = [
        ['Expertise', '#expertise'],
        ['Proyectos', '#proyectos'],
        ['Trayectoria', '#trayectoria'],
        ['Skills', '#skills'],
        ['Contacto', '#contacto'],
      ];
      const pillars = [
        {
          icon: BrainCircuit,
          title: 'AI & Automation',
          text: 'Estrategia e implementacion de agentes autonomos, copilots y flujos n8n conectados con canales de venta y operacion.',
        },
        {
          icon: Code2,
          title: 'Software Engineering',
          text: 'Desarrollo full-stack robusto con PHP, SQL y JavaScript, cuidando performance, mantenibilidad e integracion.',
        },
        {
          icon: UsersRound,
          title: 'Tech Leadership',
          text: 'Gestion de equipos multidisciplinarios, priorizacion estrategica y delivery tecnico alineado a objetivos de negocio.',
        },
      ];
      const projects = [
        {
          icon: MessageSquareMore,
          title: 'AI Conversational Sales Agent',
          sub: 'WhatsApp commerce orchestration',
          text: 'Agente de ventas para WhatsApp conectado con n8n, OpenAI y Mercado Pago API para responder, calificar, cobrar y escalar conversaciones con contexto.',
          chips: ['n8n', 'OpenAI API', 'Mercado Pago', 'WhatsApp'],
        },
        {
          icon: Workflow,
          title: 'Autonomous Content Pipeline',
          sub: 'Social content operations',
          text: 'Ecosistema que planifica, genera, valida y publica contenido en redes sociales de forma 100% automatizada con IA.',
          chips: ['OpenAI', 'n8n', 'WordPress', 'Automation Ops'],
        },
      ];
      const skills = [
        [Code2, 'PHP'], [Database, 'SQL / MySQL'], [Workflow, 'n8n'], [BrainCircuit, 'OpenAI API'],
        [Blocks, 'React'], [Sparkles, 'Tailwind CSS'], [Bot, 'Automatizacion IA'], [Globe, 'WordPress'],
        [ServerCog, 'Infraestructura'], [Target, 'Strategy'], [UsersRound, 'Leadership'], [Rocket, 'Growth Systems'],
      ];
      const education = [
        [GraduationCap, 'Diplomatura en IA', 'UBA'],
        [ShieldCheck, 'Ingenieria en Electronica', '3er ano'],
        [Code2, 'Certificacion Java', 'Formacion profesional'],
      ];
      const links = [
        [Linkedin, 'LinkedIn', 'https://www.linkedin.com/search/results/people/?keywords=Carlos%20Salini'],
        [Globe, 'Nolapenses', 'https://nolapenses.com'],
        [Github, 'GitHub', 'https://github.com/xKaruXx'],
      ];

      const SectionTitle = ({ tag, title, text }) => html`
        <div className="max-w-3xl">
          <p className="eyebrow">${tag}</p>
          <h2 className="mt-4 font-display text-3xl font-bold tracking-tight text-white sm:text-4xl">${title}</h2>
          <p className="mt-4 text-base leading-8 text-slate-300 sm:text-lg">${text}</p>
        </div>
      `;

      const Card = ({ children, className = '' }) => html`
        <div className=${`surface rounded-3xl p-6 shadow-panel transition duration-300 hover:-translate-y-2 hover:border-cyan-300/30 hover:bg-white/[0.06] ${className}`}>
          ${children}
        </div>
      `;

      const App = () => html`
        <div className="relative overflow-hidden">
          <div className="pointer-events-none absolute inset-0 opacity-25" style=${{ backgroundImage: 'linear-gradient(rgba(148,163,184,.08) 1px, transparent 1px), linear-gradient(90deg, rgba(148,163,184,.08) 1px, transparent 1px)', backgroundSize: '44px 44px', maskImage: 'linear-gradient(180deg, rgba(255,255,255,.8), transparent 78%)' }}></div>
          <div className="pointer-events-none absolute -left-24 top-24 h-72 w-72 rounded-full bg-cyan-400/10 blur-3xl"></div>
          <div className="pointer-events-none absolute right-0 top-0 h-80 w-80 rounded-full bg-blue-500/10 blur-3xl"></div>

          <header className="sticky top-0 z-50 border-b border-white/5 bg-slate-950/75 backdrop-blur-xl">
            <div className="shell flex items-center justify-between py-4">
              <a href="#top" className="flex items-center gap-4">
                <div className="flex h-11 w-11 items-center justify-center rounded-2xl bg-panel font-display text-lg font-bold text-white shadow-glow">CS</div>
                <div>
                  <p className="font-display text-base font-bold text-white sm:text-lg">Carlos \"Charly\" Salini</p>
                  <p className="font-mono text-[11px] uppercase tracking-[0.22em] text-slate-400">AI & Automation Leader</p>
                </div>
              </a>
              <nav className="hidden items-center gap-6 lg:flex">
                ${nav.map(([label, href]) => html`<a key=${href} href=${href} className="text-sm text-slate-300 transition hover:text-white">${label}</a>`)}
              </nav>
              <a href="#contacto" className="hidden rounded-full border border-cyan-400/25 bg-cyan-400/10 px-5 py-2.5 text-sm font-medium text-cyan-100 transition hover:border-cyan-300/40 hover:bg-cyan-400/15 md:inline-flex">Hablemos</a>
            </div>
          </header>

          <main>
            <section id="top" className="shell relative py-16 sm:py-24 lg:py-28">
              <div className="grid items-start gap-10 lg:grid-cols-[1.08fr_0.92fr] lg:gap-12">
                <${motion.div} initial=${{ opacity: 0, y: 24 }} animate=${{ opacity: 1, y: 0 }} transition=${{ duration: 0.7, ease: 'easeOut' }}>
                  <div className="inline-flex items-center gap-3 rounded-full border border-cyan-400/20 bg-cyan-400/10 px-4 py-2 text-sm text-cyan-100">
                    <${Sparkles} className="h-4 w-4 text-cyan-300" />
                    <span className="font-mono uppercase tracking-[0.18em] text-[11px]">Senior Technology Leader | AI & Automation Expert</span>
                  </div>
                  <h1 className="mt-8 max-w-4xl font-display text-5xl font-bold tracking-[-0.04em] text-white sm:text-6xl lg:text-7xl">Engineering the Future of <span className="text-gradient">Automation & AI</span></h1>
                  <p className="mt-6 max-w-3xl text-lg leading-8 text-slate-300 sm:text-xl">Lider de Tecnologia con 8+ anos de experiencia transformando procesos de negocio mediante Inteligencia Artificial y Arquitectura de Software de alto nivel.</p>
                  <p className="mt-6 max-w-2xl text-base leading-8 text-slate-400">Perfil tecnico, analitico y orientado a ejecucion. Hoy combina liderazgo de equipos, automatizacion aplicada y diseno de sistemas para ventas, marketing y operacion digital.</p>
                  <div className="mt-10 flex flex-col gap-4 sm:flex-row">
                    <a href="#proyectos" className="group inline-flex items-center justify-center gap-3 rounded-full bg-accent px-6 py-3.5 text-sm font-semibold text-slate-950 transition hover:shadow-glow">Ver Proyectos <${ArrowRight} className="h-4 w-4 transition group-hover:translate-x-1" /></a>
                    <a href="#contacto" className="inline-flex items-center justify-center rounded-full border border-white/10 bg-white/[0.04] px-6 py-3.5 text-sm font-semibold text-slate-100 transition hover:border-cyan-300/30 hover:bg-white/[0.07]">Contactar</a>
                  </div>
                  <div className="mt-12 grid gap-4 sm:grid-cols-3">
                    ${[
                      ['8+', 'anos impulsando software, automatizacion e IA aplicada al negocio'],
                      ['Coradir', 'liderazgo de software y diseno con foco en ejecucion tecnica real'],
                      ['n8n + OpenAI', 'stack operativo para ventas, marketing y sistemas autonomos'],
                    ].map(([value, label]) => html`<${Card} key=${value}><div className="font-display text-2xl font-bold text-white sm:text-3xl">${value}</div><p className="mt-2 text-sm leading-6 text-slate-300">${label}</p></${Card}>`)}
                  </div>
                </${motion.div}>
                <${motion.div} initial=${{ opacity: 0, y: 24 }} animate=${{ opacity: 1, y: 0 }} transition=${{ duration: 0.8, delay: 0.15, ease: 'easeOut' }} className="grid gap-4 sm:grid-cols-2">
                  <div className="strong relative overflow-hidden rounded-[32px] p-6 shadow-glow sm:col-span-2">
                    <div className="absolute inset-0 bg-panel opacity-90"></div>
                    <div className="relative">
                      <p className="eyebrow">Automation Architecture</p>
                      <h2 className="mt-4 font-display text-3xl font-bold text-white">Sistemas pensados para operar, aprender y escalar.</h2>
                      <p className="mt-4 text-sm leading-7 text-slate-300">Diseno de soluciones donde la IA no es decoracion: entra en el flujo, toma decisiones con contexto y acelera resultados de negocio.</p>
                      <div className="mt-8 space-y-4">
                        ${[
                          ['Lead intake & routing', '90%'],
                          ['AI reasoning & replies', '82%'],
                          ['Payments, CRM & follow-up', '74%'],
                        ].map(([label, width]) => html`<div key=${label}><div className="mb-2 flex items-center justify-between text-xs text-slate-400"><span>${label}</span><span className="font-mono uppercase tracking-[0.18em] text-cyan-300/80">active</span></div><div className="h-2 rounded-full bg-white/5"><div className="h-2 rounded-full bg-accent" style=${{ width }}></div></div></div>`)}
                      </div>
                    </div>
                  </div>
                  <${Card}><${Building2} className="h-6 w-6 text-cyan-200" /><p className="mt-5 font-display text-xl font-bold text-white">Coradir S.A.</p><p className="mt-2 text-sm leading-7 text-slate-300">Software, diseno y direccion tecnica con foco en continuidad operativa.</p></${Card}>
                  <${Card}><${Rocket} className="h-6 w-6 text-cyan-200" /><p className="mt-5 font-display text-xl font-bold text-white">Nolapenses!</p><p className="mt-2 text-sm leading-7 text-slate-300">Venture orientada a automatizacion, IA aplicada y growth systems.</p></${Card}>
                  <${Card} className="sm:col-span-2"><p className="eyebrow">Operating Stack</p><div className="mt-4 flex flex-wrap gap-2">${['PHP','SQL','JavaScript','React','Tailwind','n8n','OpenAI','WordPress'].map((item) => html`<span key=${item} className="rounded-full border border-white/10 bg-white/[0.03] px-3 py-2 font-mono text-xs uppercase tracking-[0.16em] text-slate-300">${item}</span>`)}</div></${Card}>
                </${motion.div}>
              </div>
            </section>

            <${motion.section} id="expertise" className="shell py-16 sm:py-20" initial=${{ opacity: 0, y: 28 }} whileInView=${{ opacity: 1, y: 0 }} viewport=${{ once: true, amount: 0.2 }} transition=${{ duration: 0.7 }}>
              <div className="flex flex-col gap-10">
                <${SectionTitle}
                  tag="Core Expertise"
                  title="Tres pilares para construir automatizacion con criterio."
                  text="Del diseno de agentes IA a la arquitectura de software y el liderazgo de equipos, el foco esta puesto en soluciones que funcionen en el mundo real."
                />
                <div className="grid gap-5 lg:grid-cols-3">
                  ${pillars.map((item) => html`
                    <${motion.div} key=${item.title} whileHover=${{ y: -10 }}>
                      <${Card}>
                        <div className="flex items-start justify-between gap-4">
                          <div className="flex h-14 w-14 items-center justify-center rounded-2xl bg-panel shadow-glow"><${item.icon} className="h-6 w-6 text-cyan-200" /></div>
                          <span className="font-mono text-[11px] uppercase tracking-[0.24em] text-slate-500">Pilar</span>
                        </div>
                        <h3 className="mt-6 font-display text-2xl font-bold text-white">${item.title}</h3>
                        <p className="mt-4 text-sm leading-7 text-slate-300">${item.text}</p>
                      </${Card}>
                    </${motion.div}>
                  `)}
                </div>
              </div>
            </${motion.section}>

            <${motion.section} id="proyectos" className="shell py-16 sm:py-20" initial=${{ opacity: 0, y: 28 }} whileInView=${{ opacity: 1, y: 0 }} viewport=${{ once: true, amount: 0.2 }} transition=${{ duration: 0.7 }}>
              <div className="flex flex-col gap-10">
                <${SectionTitle}
                  tag="Featured Projects"
                  title="Proyectos disenados para mover revenue, contenido y operaciones."
                  text="Casos de automatizacion e IA con foco en eficiencia operativa, experiencia conversacional y capacidad de escala."
                />
                <div className="grid gap-6 lg:grid-cols-2">
                  ${projects.map((project) => html`
                    <${motion.article} key=${project.title} whileHover=${{ y: -10 }} className="strong relative overflow-hidden rounded-[32px] p-7 shadow-glow transition hover:border-cyan-300/35">
                      <div className="absolute inset-0 bg-panel opacity-80"></div>
                      <div className="relative">
                        <div className="flex items-center justify-between gap-4">
                          <div className="flex h-14 w-14 items-center justify-center rounded-2xl border border-cyan-400/20 bg-cyan-400/10"><${project.icon} className="h-6 w-6 text-cyan-200" /></div>
                          <span className="eyebrow text-right">${project.sub}</span>
                        </div>
                        <h3 className="mt-6 font-display text-2xl font-bold text-white sm:text-3xl">${project.title}</h3>
                        <p className="mt-4 text-sm leading-7 text-slate-300 sm:text-base">${project.text}</p>
                        <div className="mt-6 flex flex-wrap gap-2">${project.chips.map((item) => html`<span key=${item} className="rounded-full border border-white/10 bg-white/[0.04] px-3 py-1.5 font-mono text-xs uppercase tracking-[0.16em] text-slate-300">${item}</span>`)}</div>
                      </div>
                    </${motion.article}>
                  `)}
                </div>
              </div>
            </${motion.section}>
            <${motion.section} id="trayectoria" className="shell py-16 sm:py-20" initial=${{ opacity: 0, y: 28 }} whileInView=${{ opacity: 1, y: 0 }} viewport=${{ once: true, amount: 0.2 }} transition=${{ duration: 0.7 }}>
              <div className="grid gap-10 lg:grid-cols-[1.05fr_0.95fr] lg:gap-12">
                <div className="space-y-8">
                  <${SectionTitle}
                    tag="Experience"
                    title="Trayectoria con liderazgo tecnico y ejecucion concreta."
                    text="Experiencia articulando equipos, sistemas y procesos para convertir complejidad en operacion clara, escalable y medible."
                  />
                  <div className="space-y-6">
                    ${[
                      ['Coradir S.A.', 'Gerente de Area de Software y Diseno', 'Conduccion tecnica y estrategica de equipos, productos y procesos digitales con foco en continuidad operativa.'],
                      ['Nolapenses!', 'Founder', 'Diseno e implementacion de soluciones de automatizacion e IA enfocadas en ventas, marketing y growth systems.'],
                    ].map(([org, role, text], index) => html`
                      <div key=${org} className="relative pl-10">
                        <div className="absolute left-0 top-1.5 flex h-6 w-6 items-center justify-center rounded-full border border-cyan-400/30 bg-slate-950"><div className="h-2.5 w-2.5 rounded-full bg-cyan-300"></div></div>
                        ${index === 0 ? html`<div className="absolute left-[11px] top-8 h-[calc(100%+1.5rem)] w-px bg-white/10"></div>` : null}
                        <${Card}><p className="eyebrow">Actualidad</p><h3 className="mt-3 font-display text-2xl font-bold text-white">${org}</h3><p className="mt-2 text-base font-medium text-cyan-200">${role}</p><p className="mt-5 text-sm leading-7 text-slate-300">${text}</p></${Card}>
                      </div>
                    `)}
                  </div>
                </div>
                <div className="space-y-8">
                  <${SectionTitle}
                    tag="Education"
                    title="Formacion con base tecnica y mirada aplicada."
                    text="Ingenieria, inteligencia artificial y fundamentos solidos de programacion para tomar decisiones con criterio."
                  />
                  <div className="grid gap-5">
                    ${education.map(([Icon, title, sub]) => html`<${Card} key=${title}><div className="flex h-12 w-12 items-center justify-center rounded-2xl border border-white/10 bg-white/[0.04]"><${Icon} className="h-5 w-5 text-cyan-200" /></div><h3 className="mt-5 font-display text-xl font-bold text-white">${title}</h3><p className="mt-2 font-mono text-xs uppercase tracking-[0.18em] text-cyan-300/75">${sub}</p></${Card}>`)}
                  </div>
                </div>
              </div>
            </${motion.section}>

            <${motion.section} id="skills" className="shell py-16 sm:py-20" initial=${{ opacity: 0, y: 28 }} whileInView=${{ opacity: 1, y: 0 }} viewport=${{ once: true, amount: 0.2 }} transition=${{ duration: 0.7 }}>
              <div className="flex flex-col gap-10">
                <${SectionTitle}
                  tag="Skills Hub"
                  title="Stack tecnico listo para producto, automatizacion y escala."
                  text="Tecnologias y capacidades que Charly combina para construir experiencias, pipelines y sistemas que conectan software con resultados."
                />
                <div className="grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
                  ${skills.map(([Icon, label]) => html`<${motion.div} key=${label} whileHover=${{ scale: 1.03, y: -6 }}><${Card}><div className="flex items-center gap-4"><div className="flex h-11 w-11 items-center justify-center rounded-2xl border border-white/10 bg-white/[0.04]"><${Icon} className="h-5 w-5 text-cyan-200" /></div><h3 className="font-display text-lg font-bold text-white">${label}</h3></div></${Card}></${motion.div}>`)}
                </div>
              </div>
            </${motion.section}>

            <${motion.section} id="contacto" className="shell py-16 pb-12 sm:py-20" initial=${{ opacity: 0, y: 28 }} whileInView=${{ opacity: 1, y: 0 }} viewport=${{ once: true, amount: 0.2 }} transition=${{ duration: 0.7 }}>
              <div className="strong relative overflow-hidden rounded-[36px] p-7 shadow-glow sm:p-10">
                <div className="absolute inset-0 bg-panel opacity-90"></div>
                <div className="relative grid gap-8 lg:grid-cols-[1.1fr_0.9fr] lg:items-end">
                  <div>
                    <p className="eyebrow">Contact & Social</p>
                    <h2 className="mt-4 font-display text-3xl font-bold tracking-tight text-white sm:text-4xl">Automatizacion, IA y liderazgo tecnico con foco en impacto real.</h2>
                    <p className="mt-5 max-w-2xl text-base leading-8 text-slate-300">Disponible para conversaciones sobre arquitectura de automatizacion, agentes IA, operaciones de revenue y evolucion de equipos y productos digitales.</p>
                    <div className="mt-8 flex flex-wrap gap-3">
                      ${links.map(([Icon, label, href]) => html`<a key=${label} href=${href} target="_blank" rel="noreferrer" className="group inline-flex items-center justify-center gap-3 rounded-full border border-white/10 bg-white/[0.04] px-5 py-3 text-sm font-medium text-slate-200 transition hover:border-cyan-300/30 hover:bg-white/[0.07] hover:text-white"><${Icon} className="h-4 w-4 text-cyan-300" /><span>${label}</span><${ArrowUpRight} className="h-4 w-4 text-slate-500 transition group-hover:text-cyan-200" /></a>`)}
                    </div>
                  </div>
                  <div className="grid gap-4 sm:grid-cols-2">
                    <${Card} className="h-full"><p className="font-mono text-xs uppercase tracking-[0.22em] text-slate-500">Base</p><p className="mt-3 font-display text-2xl font-bold text-white">San Luis, Argentina</p><p className="mt-3 text-sm leading-7 text-slate-300">Vision estrategica, ejecucion tecnica y sensibilidad por el detalle operativo.</p></${Card}>
                    <${Card} className="h-full"><p className="font-mono text-xs uppercase tracking-[0.22em] text-slate-500">Focus</p><p className="mt-3 font-display text-2xl font-bold text-white">AI for Business</p><p className="mt-3 text-sm leading-7 text-slate-300">Soluciones de ventas, marketing y automatizacion que acortan ciclos y elevan capacidad operativa.</p></${Card}>
                  </div>
                </div>
              </div>
            </${motion.section}>
          </main>

          <footer className="shell pb-10">
            <div className="flex flex-col gap-4 border-t border-white/8 pt-6 text-sm text-slate-500 sm:flex-row sm:items-center sm:justify-between">
              <p>Portfolio de Carlos \"Charly\" Salini.</p>
              <p className="font-mono text-xs uppercase tracking-[0.18em] text-slate-600">Software - Automation - AI Leadership</p>
            </div>
          </footer>
        </div>
      `;

      createRoot(document.getElementById('root')).render(html`<${App} />`);
    </script>
  </body>
</html>
